<section id="connect" class="section-band bg-gold text-ink">
  <div class="mx-auto grid max-w-[1440px] gap-10 px-4 py-16 sm:px-6 lg:grid-cols-[1fr_0.8fr] lg:px-10 lg:py-24">
    <div>
      <p class="mono-label text-ink/70">Commission inquiry</p>
      <h2 class="section-title mt-4">Start with the brief.</h2>
      <p class="mt-5 max-w-2xl text-lg leading-8 text-ink/72">Tell us what the van has to make possible. If the schedule is closed, the answer is a sentence. If there is room, the next step is a call.</p>
    </div>
    <form class="connect-form grid gap-3" action="mailto:build@drifter.example" method="post" enctype="text/plain">
      <label>
        <span>Name</span>
        <input name="name" autocomplete="name" />
      </label>
      <label>
        <span>Email</span>
        <input name="email" type="email" autocomplete="email" />
      </label>
      <label>
        <span>What begins next?</span>
        <textarea name="brief" rows="4"></textarea>
      </label>
      <button class="button-cut min-h-12 border border-ink bg-ink px-5 py-3 text-sm font-black uppercase tracking-[0.12em] text-gold transition hover:bg-transparent hover:text-ink" type="submit">Send Brief</button>
    </form>
  </div>
</section>
