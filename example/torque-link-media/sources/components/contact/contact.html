<section class="section contact" id="contact" aria-labelledby="contact-title">
    <div class="container container--narrow contact__grid">
        <div>
            <h2 id="contact-title">Start with a focused discovery call.</h2>
            <p>
                Share a few details about your product category and campaign goals. TorqueLink Media
                will respond with next steps for a practical sponsorship discussion.
            </p>
            <ul class="socials" aria-label="Social links">
                <li><a href="mailto:hello@torquelinkmedia.com" aria-label="Email">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M4 5h16v14H4z"></path>
                        <path d="m4 7 8 6 8-6"></path>
                    </svg>
                </a></li>
                <li><a href="https://www.linkedin.com/" target="_blank" rel="noreferrer" aria-label="LinkedIn">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M6.5 10v8"></path>
                        <path d="M6.5 6.5v.1"></path>
                        <path d="M11 18v-8"></path>
                        <path d="M11 13.5c0-2.1 1.2-3.5 3.1-3.5 1.8 0 2.9 1.2 2.9 3.5V18"></path>
                    </svg>
                </a></li>
                <li><a href="https://www.facebook.com/" target="_blank" rel="noreferrer" aria-label="Facebook">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M14 8h3V4h-3c-3 0-5 2-5 5v2H6v4h3v5h4v-5h3l1-4h-4V9c0-.6.4-1 1-1z"></path>
                    </svg>
                </a></li>
                <li><a href="https://www.youtube.com/" target="_blank" rel="noreferrer" aria-label="YouTube">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M22 12s0-4-1-5c-.6-.7-1.3-.8-2-.9C16.2 5 12 5 12 5s-4.2 0-7 .1c-.7.1-1.4.2-2 .9-1 1-1 5-1 5s0 4 1 5c.6.7 1.3.8 2 .9 2.8.1 7 .1 7 .1s4.2 0 7-.1c.7-.1 1.4-.2 2-.9 1-1 1-5 1-5z"></path>
                        <path d="m10 9 5 3-5 3z"></path>
                    </svg>
                </a></li>
                <li><a href="https://www.instagram.com/" target="_blank" rel="noreferrer" aria-label="Instagram">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <rect x="4" y="4" width="16" height="16" rx="5"></rect>
                        <circle cx="12" cy="12" r="3.5"></circle>
                        <path d="M17 7h.1"></path>
                    </svg>
                </a></li>
                <li><a href="https://www.tiktok.com/" target="_blank" rel="noreferrer" aria-label="TikTok">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M14 4v10.2a4 4 0 1 1-4-4"></path>
                        <path d="M14 4c.7 2.7 2.4 4.5 5 5"></path>
                    </svg>
                </a></li>
            </ul>
        </div>
        <form class="contact__form" action="mailto:hello@torquelinkmedia.com" method="post" enctype="text/plain">
            <label class="contact__field">
                Name
                <input type="text" name="name" autocomplete="name" required>
            </label>
            <label class="contact__field">
                Work email
                <input type="email" name="email" autocomplete="email" required>
            </label>
            <label class="contact__field">
                Company
                <input type="text" name="company" autocomplete="organization">
            </label>
            <label class="contact__field">
                Product category
                <select name="product-category" required>
                    <option value="">Select one</option>
                    <option>Aftermarket parts</option>
                    <option>Car-care products</option>
                    <option>Tools and equipment</option>
                    <option>Accessories</option>
                    <option>Other automotive product</option>
                </select>
            </label>
            <label class="contact__field contact__field--full">
                Campaign notes
                <textarea name="message" rows="5"
                          placeholder="Tell us what you are launching or trying to improve."></textarea>
            </label>
            <button class="button button--primary contact__field--full" type="submit">Send enquiry</button>
            <p class="contact__note" role="status" aria-live="polite"></p>
        </form>
    </div>
</section>
